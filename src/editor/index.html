<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch Editor</title>
  <link rel="stylesheet" href="./editor.css">
</head>
<body>
  <div id="app">
    <div id="toolbar" role="toolbar" aria-label="Drawing tools">
      <div class="status-dot" role="status" aria-label="Disconnected" title="Disconnected"></div>
      <span class="canvas-name"></span>
      <!-- Tool buttons, separators, and controls injected by toolbar.ts -->
    </div>
    <div id="main-area">
      <div id="canvas-container"></div>
    </div>
  </div>
  <script type="module" src="./editor.ts"></script>
</body>
</html>
