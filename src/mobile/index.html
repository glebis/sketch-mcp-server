<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Sketch Mobile</title>
  <link rel="stylesheet" href="./mobile.css">
</head>
<body>
  <div id="app">
    <div id="canvas-area">
      <canvas id="draw-canvas"></canvas>
    </div>

    <div id="text-panel" class="panel hidden">
      <div id="text-fields"></div>
      <div class="empty-state">No editable text fields on canvas</div>
    </div>

    <div id="photo-panel" class="panel hidden">
      <label class="photo-btn" for="photo-input">Take Photo</label>
      <input type="file" id="photo-input" accept="image/*" capture="environment">
      <label class="photo-btn" for="gallery-input">Choose from Gallery</label>
      <input type="file" id="gallery-input" accept="image/*">
      <div id="photo-preview"></div>
    </div>

    <nav id="tab-bar">
      <button class="tab active" data-tab="draw">Draw</button>
      <button class="tab" data-tab="text">Text</button>
      <button class="tab" data-tab="photo">Photo</button>
      <button class="tab-collapse" id="collapse-btn">&darr;</button>
    </nav>
  </div>

  <script type="module" src="./mobile.ts"></script>
</body>
</html>
